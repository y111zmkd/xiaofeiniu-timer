<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#000000"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="小飞牛计时"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./assets/icon-180.png"><title>小飞牛计时</title><style>
*{box-sizing:border-box}:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#000;color:#f7f7f7}html,body{min-height:100%;background:#000}body{margin:0;min-width:320px;position:relative}body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 50% 0,#202020 0,#050505 42%,#000 100%)}main{position:relative;z-index:1;width:min(100%,560px);margin:auto;padding:calc(22px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom))}header{text-align:center;margin-bottom:16px}h1{font-size:1.8rem;margin:0;font-weight:750;letter-spacing:.04em}header p{margin:4px 0 0;color:#9b9b9f;font-size:.9rem}.section{min-width:0;padding:14px;border:1px solid #303034;border-radius:20px;background:linear-gradient(145deg,#1b1b1d,#101011);box-shadow:0 14px 24px #0008}.section h2{margin:0 0 10px;font-size:1.05rem;text-align:center}.time-grid{position:relative;display:grid;grid-template-columns:minmax(0,1fr) 28px minmax(0,1fr);align-items:center;width:100%;max-width:100%;min-width:0;height:168px;overflow:hidden;border:1px solid #4b4b50;border-radius:15px;background:#090909}.colon{text-align:center;font-size:2.35rem;font-weight:700;z-index:2}.wheel{height:168px;min-width:0;overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none;overscroll-behavior:contain;touch-action:pan-y;padding:56px 0;-webkit-mask-image:linear-gradient(to bottom,transparent 0,#000 22%,#000 78%,transparent 100%);mask-image:linear-gradient(to bottom,transparent 0,#000 22%,#000 78%,transparent 100%)}.wheel::-webkit-scrollbar{display:none}.wheel button{display:block;width:100%;height:56px;padding:0;border:0;background:transparent;color:#777;font-family:inherit;font-size:1.55rem;font-weight:500;text-align:center;scroll-snap-align:center;cursor:pointer}.wheel button.active{border-top:1px solid #555;border-bottom:1px solid #555;background:#29292c;color:#fff;font-size:clamp(2.2rem,10vw,3rem);font-weight:750}.result{text-align:center;padding:18px 8px 4px}.result small{display:block;color:#929297;margin-bottom:5px}.result strong{font-size:clamp(2.3rem,10vw,3.6rem);letter-spacing:-.05em}.notice{margin:10px 0 0;text-align:center;color:#ff9b9b;font-size:.9rem}.notice:empty{display:none}.actions{text-align:center;margin-top:16px}.clear-button{border:1px solid #777;background:transparent;border-radius:99px;color:#e8e8ea;padding:12px 32px;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer}.clear-button:active{background:#333}.summary-panel-content{display:grid;gap:12px}.summary-section{padding:12px}.summary-section .time-grid,.summary-section .wheel{height:144px}.summary-section .wheel{padding:48px 0}.summary-section .wheel button{height:48px}.summary-section .wheel button.active{font-size:clamp(2.25rem,9vw,2.8rem)}.operator{display:grid;grid-template-columns:1fr 1fr;width:min(100%,210px);margin:auto;padding:4px;border:1px solid #4b4b50;border-radius:99px;background:#101011}.operator button{border:0;border-radius:99px;background:transparent;color:#777;padding:9px 24px;font-family:inherit;font-size:1.45rem;font-weight:700;cursor:pointer}.operator button[aria-pressed="true"]{background:#303034;color:#fff}.summary-result{padding:2px 8px 0}.summary-result strong{font-size:clamp(2rem,9vw,3.1rem)}@media(max-width:390px){main{padding:calc(18px + env(safe-area-inset-top)) 12px calc(20px + env(safe-area-inset-bottom))}.section{padding:12px}.time-grid{grid-template-columns:minmax(0,1fr) 22px minmax(0,1fr)}.summary-panel-content{gap:10px}.summary-section{padding:10px}.summary-result{padding-top:0}.actions{margin-top:10px}}
.wheel button.active{font-size:clamp(2.5rem,10vw,3.1rem)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:14px;padding:4px;border:1px solid #303034;border-radius:14px;background:#101011}.tabs button{min-width:0;border:0;border-radius:10px;background:transparent;color:#888;padding:10px 6px;font-family:inherit;font-size:.9rem;font-weight:600;white-space:nowrap;cursor:pointer}.tabs button[aria-selected="true"]{background:#303034;color:#fff}.tabs button:focus-visible{outline:2px solid #aaa;outline-offset:1px}[hidden]{display:none!important}
</style></head><body><main><header><h1>小飞牛计时</h1><nav class="tabs" role="tablist" aria-label="计算类型"><button id="calculator-tab" type="button" role="tab" aria-selected="true" aria-controls="calculator-panel" data-panel="calculator-panel">航段时长计算</button><button id="summary-tab" type="button" role="tab" aria-selected="false" aria-controls="summary-panel" data-panel="summary-panel">航时汇总运算</button></nav></header>
<section id="calculator-panel" role="tabpanel" aria-labelledby="calculator-tab">
<section class="section"><h2>开始时间</h2><div class="time-grid"><div id="start-hour" class="wheel" role="listbox" aria-label="开始时间小时"></div><div class="colon">:</div><div id="start-minute" class="wheel" role="listbox" aria-label="开始时间分钟"></div></div></section>
<div class="result" aria-live="polite"><small>总飞行时长</small><strong id="duration">1 小时 16 分钟</strong><p class="notice" id="notice"></p></div>
<section class="section"><h2>结束时间</h2><div class="time-grid"><div id="end-hour" class="wheel" role="listbox" aria-label="结束时间小时"></div><div class="colon">:</div><div id="end-minute" class="wheel" role="listbox" aria-label="结束时间分钟"></div></div></section>
<div class="actions"><button class="clear-button" id="clear" type="button">清空</button></div>
</section><section id="summary-panel" role="tabpanel" aria-labelledby="summary-tab" hidden><div class="summary-panel-content">
<section class="section summary-section"><h2>第一段航时</h2><div class="time-grid"><div id="summary-first-hour" class="wheel" role="listbox" aria-label="第一段航时小时"></div><div class="colon">:</div><div id="summary-first-minute" class="wheel" role="listbox" aria-label="第一段航时分钟"></div></div></section>
<div class="operator" role="group" aria-label="运算方式"><button id="summary-add" type="button" aria-pressed="true" aria-label="加法">＋</button><button id="summary-subtract" type="button" aria-pressed="false" aria-label="减法">−</button></div>
<section class="section summary-section"><h2>第二段航时</h2><div class="time-grid"><div id="summary-second-hour" class="wheel" role="listbox" aria-label="第二段航时小时"></div><div class="colon">:</div><div id="summary-second-minute" class="wheel" role="listbox" aria-label="第二段航时分钟"></div></div></section>
<div class="result summary-result" aria-live="polite"><small>计算结果</small><strong id="summary-result">2 小时 0 分钟</strong><p class="notice" id="summary-notice"></p></div>
<div class="actions"><button class="clear-button" id="summary-clear" type="button">清空</button></div>
</div></section></main><script>
const state={sh:null,sm:null,eh:null,em:null},duration=document.querySelector('#duration'),notice=document.querySelector('#notice'),controllers=[];
const summaryState={firstHour:1,firstMinute:0,secondHour:1,secondMinute:0,operation:'add'},summaryControllers=[];
const summaryResult=document.querySelector('#summary-result'),summaryNotice=document.querySelector('#summary-notice');
const ROW=56,COPIES=9,pad=n=>String(n).padStart(2,'0');
function update(){if(Object.values(state).some(value=>value===null)){duration.textContent='—';notice.textContent='请选择开始和结束时间';return}const start=state.sh*60+state.sm,end=state.eh*60+state.em,minutes=end-start;if(minutes<0){duration.textContent='—';notice.textContent='结束时间应晚于开始时间';return}duration.textContent=`${Math.floor(minutes/60)} 小时 ${minutes%60} 分钟`;notice.textContent=''}
function calculateDurationSummary(first,second,operation){const firstMinutes=first.hours*60+first.minutes,secondMinutes=second.hours*60+second.minutes,totalMinutes=operation==='subtract'?firstMinutes-secondMinutes:firstMinutes+secondMinutes;if(totalMinutes<0)return{totalMinutes:null,formatted:null,error:'SECOND_EXCEEDS_FIRST'};return{totalMinutes,formatted:`${Math.floor(totalMinutes/60)} 小时 ${totalMinutes%60} 分钟`,error:null}}
function updateSummary(){const result=calculateDurationSummary({hours:summaryState.firstHour,minutes:summaryState.firstMinute},{hours:summaryState.secondHour,minutes:summaryState.secondMinute},summaryState.operation);if(result.error==='SECOND_EXCEEDS_FIRST'){summaryResult.textContent='—';summaryNotice.textContent='第二段航时不能大于第一段航时';return}summaryResult.textContent=result.formatted;summaryNotice.textContent=''}
function initWheel(id,max,initial,targetState,key,onChange,collection,rowHeight=ROW){
  const wheel=document.querySelector('#'+id),period=max+1,middleCycle=Math.floor(COPIES/2),total=period*COPIES,buttons=[];
  let frame=0;
  for(let index=0;index<total;index++){
    const value=index%period,button=document.createElement('button');
    button.type='button';button.setAttribute('role','option');button.dataset.index=index;button.textContent=pad(value);
    button.addEventListener('click',()=>select(index,true));wheel.append(button);buttons.push(button);
  }
  function select(index,move){
    index=Math.max(0,Math.min(total-1,index));targetState[key]=index%period;
    buttons.forEach((button,buttonIndex)=>{const active=buttonIndex===index;button.classList.toggle('active',active);button.setAttribute('aria-selected',String(active))});
    if(move)wheel.scrollTo({top:index*rowHeight,behavior:'smooth'});onChange();
  }
  function recenter(index){
    const value=index%period;
    if(index<period*2||index>=period*(COPIES-2)){
      const centeredIndex=middleCycle*period+value;
      wheel.scrollTop=centeredIndex*rowHeight;
      return centeredIndex;
    }
    return index;
  }
  function alignToValue(value){const alignedIndex=middleCycle*period+value;wheel.scrollTop=alignedIndex*rowHeight;select(alignedIndex,false)}
  wheel.addEventListener('scroll',()=>{cancelAnimationFrame(frame);frame=requestAnimationFrame(()=>{if(wheel.closest('[hidden]'))return;const index=recenter(Math.round(wheel.scrollTop/rowHeight));select(index,false)})},{passive:true});
  alignToValue(initial);
  const controller={clear(){targetState[key]=null;buttons.forEach(button=>{button.classList.remove('active');button.setAttribute('aria-selected','false')});onChange()},reset(value=initial){alignToValue(value)},align(){alignToValue(targetState[key])}};
  collection.push(controller);return controller;
}
function switchPanel(panelId){
  document.querySelectorAll('[role="tabpanel"]').forEach(panel=>panel.hidden=panel.id!==panelId);
  document.querySelectorAll('[role="tab"]').forEach(tab=>tab.setAttribute('aria-selected',String(tab.dataset.panel===panelId)));
  if(panelId==='summary-panel'){
    summaryControllers.forEach(controller=>controller.align());
    requestAnimationFrame(()=>summaryControllers.forEach(controller=>controller.align()));
  }
}
document.querySelectorAll('[role="tab"]').forEach(tab=>tab.addEventListener('click',()=>switchPanel(tab.dataset.panel)));
initWheel('start-hour',23,10,state,'sh',update,controllers);initWheel('start-minute',59,1,state,'sm',update,controllers);initWheel('end-hour',23,11,state,'eh',update,controllers);initWheel('end-minute',59,17,state,'em',update,controllers);
initWheel('summary-first-hour',30,1,summaryState,'firstHour',updateSummary,summaryControllers,48);initWheel('summary-first-minute',59,0,summaryState,'firstMinute',updateSummary,summaryControllers,48);initWheel('summary-second-hour',30,1,summaryState,'secondHour',updateSummary,summaryControllers,48);initWheel('summary-second-minute',59,0,summaryState,'secondMinute',updateSummary,summaryControllers,48);
document.querySelector('#clear').addEventListener('click',()=>controllers.forEach(controller=>controller.reset(0)));
function setSummaryOperation(operation){summaryState.operation=operation;document.querySelector('#summary-add').setAttribute('aria-pressed',String(operation==='add'));document.querySelector('#summary-subtract').setAttribute('aria-pressed',String(operation==='subtract'));updateSummary()}
document.querySelector('#summary-add').addEventListener('click',()=>setSummaryOperation('add'));document.querySelector('#summary-subtract').addEventListener('click',()=>setSummaryOperation('subtract'));
document.querySelector('#summary-clear').addEventListener('click',()=>{summaryState.operation='add';summaryControllers.forEach(controller=>controller.reset(0));setSummaryOperation('add')});update();updateSummary();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(()=>{})}
</script></body></html>
